<svg width="1280" height="320" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%,100% { opacity: 0; }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.25; }
    }
    .name { animation: fadeUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.15s both; }
    .sub  { animation: fadeUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.50s both; }
    .tech { animation: fadeUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.75s both; }
    .hdl  { animation: fadeIn 0.50s ease 0.25s both; }
    .l1   { animation: fadeIn 0.40s ease 0.40s both; }
    .l2   { animation: fadeIn 0.40s ease 0.65s both; }
    .l3   { animation: fadeIn 0.40s ease 0.88s both; }
    .cur  { animation: blink 1s step-end 1.2s infinite; }
    .dot  { animation: pulse 2.5s ease-in-out 1.5s infinite; }
    @media (prefers-reduced-motion: reduce) {
      .name,.sub,.tech,.hdl,.l1,.l2,.l3 { animation: none; opacity: 1; transform: none; }
      .cur,.dot { animation: none; opacity: 1; }
    }
  </style>

  <!-- Background -->
  <rect width="1280" height="320" fill="#0d1117"/>

  <!-- Faint brand monogram -->
  <text x="770" y="345" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
        font-size="410" font-weight="900" fill="#f97316" opacity="0.04">X</text>

  <!-- Top orange rule (SMIL grow left→right) -->
  <line x1="0" y1="54" y2="54" stroke="#f97316" stroke-width="3">
    <animate attributeName="x2" from="0" to="1280" dur="0.75s" fill="freeze" begin="0.05s"/>
  </line>

  <!-- GitHub handle -->
  <text class="hdl" x="1200" y="44"
        font-family="'Courier New',Courier,monospace"
        font-size="12" fill="#f97316" text-anchor="end" letter-spacing="1">@Xabilimon1</text>

  <!-- Name with blinking cursor -->
  <text class="name" x="80" y="148"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="86" font-weight="800" fill="#f1f5f9" letter-spacing="6">XABILIMON<tspan class="cur" fill="#f97316" letter-spacing="0">_</tspan></text>

  <!-- Divider 1 -->
  <line class="l1" x1="80" y1="170" x2="1200" y2="170" stroke="#21262d" stroke-width="1"/>

  <!-- Role line -->
  <text class="sub" x="80" y="204"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="15" fill="#8b949e" letter-spacing="0.3">AI Developer  ·  Full-Stack Engineer  ·  UFV Madrid</text>

  <!-- Hireable indicator -->
  <circle class="dot" cx="1100" cy="200" r="4" fill="#22c55e"/>
  <text class="sub" x="1113" y="205"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="13" fill="#22c55e">hireable</text>

  <!-- Divider 2 -->
  <line class="l2" x1="80" y1="228" x2="1200" y2="228" stroke="#21262d" stroke-width="1"/>

  <!-- Tech stack (monospace) -->
  <text class="tech" x="80" y="265"
        font-family="'Courier New',Courier,monospace"
        font-size="13" fill="#f97316" letter-spacing="0.3">TypeScript  ·  React  ·  Python  ·  Supabase  ·  Vercel  ·  Node.js  ·  Tailwind  ·  Azure AD  ·  Claude Code</text>

  <!-- Divider 3 -->
  <line class="l3" x1="80" y1="288" x2="1200" y2="288" stroke="#21262d" stroke-width="1"/>

  <!-- Footer -->
  <text x="1200" y="308"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#30363d" text-anchor="end" font-style="italic">Universidad Francisco de Vitoria, Madrid</text>
</svg>